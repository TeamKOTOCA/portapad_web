<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PortaPad / 使い方</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f8f9fa;
        color: #222;
        line-height: 1.7;
      }
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        margin: 16px 0;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
      }
      a {
        color: #0b63ce;
      }
      .back {
        display: inline-block;
        margin-bottom: 16px;
      }
      code {
        background: #eef4ff;
        padding: 0 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <a class="back" href="../../index.html">トップへ戻る</a>
      <section class="card">
        <h1>PortaPad の使い方</h1>
        <ol>
          <li>PC にホストアプリをインストールして起動します。</li>
          <li>スマートフォンで <a href="../../apps/index.html">Web クライアント</a> を開きます。</li>
          <li>表示された PC を選び、QR コードを読み取って認証します。</li>
          <li>認証が完了したら、トラックパッド・キーボード・テンキーを使えます。</li>
        </ol>
      </section>
      <section class="card">
        <h2>よくある確認事項</h2>
        <ul>
          <li>PC とスマートフォンは同じネットワークに接続してください。</li>
          <li>初回は QR 認証が必要です。</li>
          <li>接続先が見つからない場合は、シグナリングサーバー設定を確認してください。</li>
        </ul>
      </section>
    </main>
  </body>
</html>
