<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PortaPad / 設定</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <a href="../index.html">トップへ戻る</a>
    <h1>設定</h1>
    <div>
      <label for="websocketaddress">シグナリングサーバー</label>
      <input id="websocketaddress" type="text" autocomplete="off">
    </div>
    <div>
      <label for="fileInput">背景画像</label>
      <input id="fileInput" type="file" accept="image/*">
    </div>
    <footer>
      <button type="button" onclick="back_remove();">背景を削除</button>
      <button type="button" onclick="Save();">保存</button>
    </footer>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const websocketAddress = document.getElementById('websocketaddress');
        if (websocketAddress) {
          websocketAddress.value = localStorage.getItem('sigserver') || '';
        }

        const background = localStorage.getItem('backgroundurls');
        if (background) {
          document.body.style.backgroundImage = `url(${background})`;
        }
      });

      function back_remove() {
        document.body.style.backgroundImage = '';
        localStorage.removeItem('backgroundurls');
      }

      function Save() {
        const websocketAddress = document.getElementById('websocketaddress').value.trim();
        if (websocketAddress) {
          localStorage.setItem('sigserver', normalizeSignalServerUrl(websocketAddress));
        }
        window.location.href = '../index.html';
      }

      function normalizeSignalServerUrl(value) {
        const trimmed = value.trim();
        if (trimmed.startsWith('ws://') || trimmed.startsWith('wss://')) {
          return trimmed;
        }
        if (trimmed.startsWith('http://')) {
          return `ws://${trimmed.slice('http://'.length)}`;
        }
        if (trimmed.startsWith('https://')) {
          return `wss://${trimmed.slice('https://'.length)}`;
        }
        return `wss://${trimmed}`;
      }

      const fileInput = document.getElementById('fileInput');
      fileInput.addEventListener('change', event => {
        const file = event.target.files[0];
        if (!file) {
          return;
        }

        const reader = new FileReader();
        reader.onload = () => {
          document.body.style.backgroundImage = `url(${reader.result})`;
          localStorage.setItem('backgroundurls', reader.result);
        };
        reader.readAsDataURL(file);
      });
    </script>
  </body>
</html>
